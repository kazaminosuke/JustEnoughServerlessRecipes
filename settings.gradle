pluginManagement {
	repositories {
		maven {
			name = 'Fabric'
			url = 'https://maven.fabricmc.net/'
		}
		maven {
			name = 'NeoForged'
			url = 'https://maven.neoforged.net/releases'
		}
		maven {
			name = 'BlameJared'
			url = 'https://maven.blamejared.com/'
		}
		mavenCentral()
		gradlePluginPortal()
	}
}

rootProject.name = 'JERS'

include('Fabric', 'NeoForge')
